name: Document to Markdown Converter

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Installs markitdown and its dependencies directly from PyPI
      - name: Install MarkItDown
        run: |
          python -m pip install --upgrade pip
          pip install "markitdown[all]"

      - name: Process Files
        run: |
          mkdir -p output_markdown
          
          # Loop through files in your input directory
          for file in input_documents/*; do
            if [ -f "$file" ]; then
              filename=$(basename -- "$file")
              filename_no_ext="${filename%.*}"
              
              echo "Processing $filename..."
              markitdown "$file" > "output_markdown/${filename_no_ext}.md"
            fi
          done

      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-results
          path: output_markdown/
